{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">Panel de administración</h2>

<div class="row mb-4">
    <div class="col-md-4">
        <div class="card text-center p-3">
            <h1>{{ total_usuarios }}</h1>
            <p class="text-muted">Usuarios registrados</p>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-center p-3">
            <h1>{{ total_ejercicios }}</h1>
            <p class="text-muted">Ejercicios creados</p>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-center p-3">
            <h1>{{ total_progresos }}</h1>
            <p class="text-muted">Registros de progreso</p>
        </div>
    </div>
</div>

<div class="d-flex gap-2">
    <a href="/admin/ejercicios" class="btn btn-dark">Gestionar ejercicios</a>
    <a href="/admin/usuarios" class="btn btn-outline-dark">Ver usuarios</a>
    <a href="/logout" class="btn btn-outline-danger">Cerrar sesión</a>
</div>
{% endblock %}
