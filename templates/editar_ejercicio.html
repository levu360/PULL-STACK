{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Editar ejercicio</h2>
    <a href="/admin/ejercicios" class="btn btn-outline-dark">← Volver</a>
</div>

<div class="card p-4">
    <form method="POST" action="/admin/ejercicios/editar/{{ ejercicio.id }}">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Nombre</label>
                <input type="text" name="nombre" class="form-control" value="{{ ejercicio.nombre }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Nivel de dificultad</label>
                <select name="nivel_dificultad" class="form-control">
                    <option {% if ejercicio.nivel_dificultad == 'Fácil' %}selected{% endif %}>Fácil</option>
                    <option {% if ejercicio.nivel_dificultad == 'Medio' %}selected{% endif %}>Medio</option>
                    <option {% if ejercicio.nivel_dificultad == 'Difícil' %}selected{% endif %}>Difícil</option>
                </select>
            </div>
            <div class="col-md-12 mb-3">
                <label>Descripción</label>
                <textarea name="descripcion" class="form-control" rows="2">{{ ejercicio.descripcion }}</textarea>
            </div>
            <div class="col-md-4 mb-3">
                <label>Series sugeridas</label>
                <input type="number" name="series_sugeridas" class="form-control" value="{{ ejercicio.series_sugeridas }}">
            </div>
            <div class="col-md-4 mb-3">
                <label>Repeticiones sugeridas</label>
                <input type="number" name="repeticiones_sugeridas" class="form-control" value="{{ ejercicio.repeticiones_sugeridas }}">
            </div>
            <div class="col-md-4 mb-3">
                <label>URL de imagen</label>
                <input type="text" name="imagen_url" class="form-control" value="{{ ejercicio.imagen_url or '' }}">
            </div>
        </div>
        <button type="submit" class="btn btn-dark">Guardar cambios</button>
    </form>
</div>
{% endblock %}
