{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Bienvenido, {{ current_user.nombre }} 💪</h2>
    <a href="/logout" class="btn btn-outline-danger">Cerrar sesión</a>
</div>

<div class="row mb-4">
    <div class="col-md-6">
        <div class="card text-center p-3">
            <h1>{{ total_rutinas }}</h1>
            <p class="text-muted">Rutinas disponibles</p>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card text-center p-3">
            <h1>{{ total_encuestas }}</h1>
            <p class="text-muted">Entrenamientos completados</p>
        </div>
    </div>
</div>

<a href="/rutinas" class="btn btn-dark">Ver rutinas</a>
{% endblock %}
